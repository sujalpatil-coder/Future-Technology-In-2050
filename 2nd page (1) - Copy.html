<!DOCTYPE html>
<html>
<head>
<title>Explore</title>

<style>
body {
    font-family: Arial;
    background: #020617;
    color: white;
    text-align: center;
    margin: 0;
    overflow-x: hidden;
}

/* Page fade-in */
body {
    animation: fadeIn 1.5s ease-in;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* Heading animation */
h1 {
    margin-top: 30px;
    animation: slideDown 1s ease-out;
}

@keyframes slideDown {
    from {
        transform: translateY(-50px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

/* Container */
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

/* Card style */
.card {
    background: #1e293b;
    margin: 15px;
    padding: 20px;
    border-radius: 15px;
    width: 250px;
    transition: 0.4s;
    animation: fadeUp 1s ease forwards;
}

/* Card entrance animation */
@keyframes fadeUp {
    from {
        transform: translateY(40px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

/* Card hover effect */
.card:hover {
    transform: translateY(-10px) scale(1.05);
    box-shadow: 0 0 25px rgba(255,255,255,0.3);
}

/* Floating effect */
.card {
    animation: float 4s ease-in-out infinite;
}

@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

/* Button container */
.center-btn {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin: 40px 0;
}

/* Button style */
.btn {
    padding: 12px 25px;
    font-size: 16px;
    border: none;
    border-radius: 25px;
    color: white;
    cursor: pointer;
    transition: 0.3s;
    position: relative;
    overflow: hidden;
}

/* Button glow animation */
.btn::before {
    content: "";
    position: absolute;
    width: 0%;
    height: 100%;
    top: 0;
    left: 0;
    background: rgba(255,255,255,0.2);
    transition: 0.4s;
}

.btn:hover::before {
    width: 100%;
}

/* Back button */
.back {
    background: linear-gradient(to right, #ff512f, #dd2476);
}

/* Next button */
.next {
    background: linear-gradient(to right, #00d2ff, #3a7bd5);
}

/* Hover effect */
.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 15px white;
}

/* Link styling */
a {
    text-decoration: none;
    color: white;
}
</style>
</head>
