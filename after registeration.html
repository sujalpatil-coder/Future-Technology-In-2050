<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Successful</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', sans-serif;
        background: radial-gradient(circle at top, #0b1a3a, #000814);
        color: white;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    body::before {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background: url('https://www.transparenttextures.com/patterns/stardust.png');
        opacity: 0.4;
    }

    .container {
        text-align: center;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 0 30px rgba(0, 183, 255, 0.6);
        z-index: 1;
    }

    h1 {
        font-size: 34px;
        color: #00e5ff;
        text-shadow: 0 0 10px #00e5ff;
    }

    h2 {
        color: #ffcc00;
        margin-bottom: 10px;
    }

    p {
        font-size: 18px;
        margin: 15px 0;
        color: #d1d9ff;
    }

    .tag {
        background: linear-gradient(90deg, #00e5ff, #2979ff);
        padding: 6px 15px;
        border-radius: 20px;
        font-size: 14px;
        display: inline-block;
        margin-bottom: 15px;
    }

    .btn {
        margin-top: 20px;
        padding: 12px 25px;
        font-size: 16px;
        border: none;
        border-radius: 30px;
        background: linear-gradient(90deg, #00e5ff, #2979ff);
        color: white;
        cursor: pointer;
        text-decoration: none;
        transition: 0.3s;
        box-shadow: 0 0 15px #00e5ff;
    }

    .btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 25px #00e5ff;
    }

    .rocket {
        font-size: 40px;
        animation: float 2s ease-in-out infinite;
    }

    @keyframes float {
        0% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0); }
    }
</style>
</head>

<body>

<div class="container">
    <div class="rocket">🚀</div>
    <div class="tag">Space Innovation Event 2026</div>
    
    <h1>Registration Successful!</h1>
    <h2>Welcome to the Mission 🚀</h2>

    <p>Your registration for the Space Event has been successfully completed.</p>
    <p>You can participate in <b>Online</b> or <b>Offline</b> mode.</p>

    <a href="2nd page (1).html" class="btn">Go Back to Home</a>
</div>

</body>
</html>
